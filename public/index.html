<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sniper Diary</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Diary Entries</h1>

        <form id="diaryForm">
            <input type="text" id="category" placeholder="Category" required />
            <input type="text" id="entry" placeholder="Entry" required />
            <input type="date" id="date" required />
            <button type="submit">Add Entry</button>
        </form>

        <input type="text" id="search" placeholder="Search by category, entry, or date" />

        <ul id="entries"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
